services:
  app:
    build: .
    image: yanto:local
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      YANTO_NODE_ROLE: master
      PORT: 8080
      DATABASE_URL: postgres://yanto:${POSTGRES_PASSWORD:-yanto}@postgres:5432/yanto
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret}
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-localhost:8080,127.0.0.1:8080}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-admin-password}
      PROJECTS_ROOT: /projects
      HOST_PROJECTS_ROOT: ${HOST_PROJECTS_ROOT:-~/projects}
      SSH_KEYS_DIR: /data/ssh
      SSH_PRIVATE_KEY_PATH: ${SSH_PRIVATE_KEY_PATH:-/root/.ssh/id_ed25519}
      MANAGED_SSH_PRIVATE_KEY_PATH: ${MANAGED_SSH_PRIVATE_KEY_PATH:-/data/ssh/id_ed25519}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      BACKUPS_DIR: /data/backups
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      WORKER_JOIN_TOKEN: ${WORKER_JOIN_TOKEN:-}
      WORKER_TOKEN_SECRET: ${WORKER_TOKEN_SECRET:-change-this-to-a-long-random-secret}
      FRP_BIND_PORT: ${FRP_BIND_PORT:-7000}
      FRP_PORT_START: ${FRP_PORT_START:-25560}
      FRP_PORT_END: ${FRP_PORT_END:-25600}
      FRP_TOKEN_PATH: /data/frp/auth-token
      FRP_DASHBOARD_URL: http://frps:7500
      FRP_CONTAINER_NAME: yanto-frps
      AGENT_DEFAULT_IMAGE: ${AGENT_DEFAULT_IMAGE:-yanto:local}
      CODEX_HOME: /data/codex
      AGENT_MAX_CONCURRENT_RUNS: ${AGENT_MAX_CONCURRENT_RUNS:-2}
      AGENT_MAX_TURNS: ${AGENT_MAX_TURNS:-40}
      AGENT_RUN_TIMEOUT_MS: ${AGENT_RUN_TIMEOUT_MS:-3600000}
      AGENT_COMMAND_TIMEOUT_MS: ${AGENT_COMMAND_TIMEOUT_MS:-600000}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_PROJECTS_ROOT:-~/projects}:/projects
      - ${SSH_SOURCE_DIR:-~/.ssh}:/root/.ssh:ro
      - yanto_ssh:/data/ssh
      - yanto_backups:/data/backups
      - yanto_frp:/data/frp:ro
      - yanto_codex:/data/codex
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frps:
    image: yanto:local
    container_name: yanto-frps
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        umask 077
        if [ ! -s /data/frp/auth-token ]; then
          od -An -N32 -tx1 /dev/urandom | tr -d ' \n' > /data/frp/auth-token
        fi
        export FRP_DASHBOARD_PASSWORD="$$(cat /data/frp/auth-token)"
        exec frps -c /etc/frp/frps.toml
    environment:
      FRP_BIND_PORT: ${FRP_BIND_PORT:-7000}
      FRP_PORT_START: ${FRP_PORT_START:-25560}
      FRP_PORT_END: ${FRP_PORT_END:-25600}
    ports:
      - "${FRP_BIND_PORT:-7000}:${FRP_BIND_PORT:-7000}/tcp"
      - "${FRP_PORT_START:-25560}-${FRP_PORT_END:-25600}:${FRP_PORT_START:-25560}-${FRP_PORT_END:-25600}/tcp"
      - "${FRP_PORT_START:-25560}-${FRP_PORT_END:-25600}:${FRP_PORT_START:-25560}-${FRP_PORT_END:-25600}/udp"
    volumes:
      - yanto_frp:/data/frp
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u \"yanto:$$(cat /data/frp/auth-token)\" http://localhost:7500/api/serverinfo >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: yanto
      POSTGRES_USER: yanto
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yanto}
    volumes:
      - yanto_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yanto -d yanto"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  yanto_postgres:
  yanto_ssh:
  yanto_backups:
  yanto_frp:
  yanto_codex:
