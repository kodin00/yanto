name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: yanto-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to VPS
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST" || (echo "Missing VPS_HOST secret" && exit 1)
          test -n "$VPS_SSH_KEY" || (echo "Missing VPS_SSH_KEY secret" && exit 1)

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          test -n "$VPS_USER" || (echo "Missing VPS_USER secret" && exit 1)
          test -n "$VPS_APP_DIR" || (echo "Missing VPS_APP_DIR secret" && exit 1)

          ssh -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            -o IdentitiesOnly=yes \
            "$VPS_USER@$VPS_HOST" \
            "bash -se" <<EOF
          set -euo pipefail
          cd $(printf '%q' "$VPS_APP_DIR")
          git pull --ff-only origin master
          docker compose -f compose.yml up -d --build --remove-orphans
          docker compose -f compose.yml ps
          EOF
